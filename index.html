<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="开球安排">
<title>开球出发安排</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:linear-gradient(160deg,#1a5632,#0d3320);min-height:100vh;color:#424242;-webkit-tap-highlight-color:transparent}
  .header{background:linear-gradient(135deg,#1a5632,#2d8a4e);padding:28px 20px 20px;text-align:center}
  .header h1{color:#fff;font-size:22px;font-weight:700;letter-spacing:2px}
  .header p{color:#d4a843;font-size:12px;margin-top:6px;letter-spacing:1px}
  .container{padding:16px;max-width:480px;margin:0 auto}
  .card{background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.12);margin-bottom:16px;overflow:hidden}
  .day-label{background:linear-gradient(135deg,#2d8a4e,#4caf50);color:#fff;padding:12px 18px;font-size:15px;font-weight:500}
  .day-body{padding:18px}
  .field-label{font-size:13px;color:#757575;margin-bottom:8px;display:block}
  .time-row{display:flex;gap:6px;align-items:center;margin-bottom:16px}
  .time-row select{flex:1;padding:12px 4px;border:1.5px solid #eee;border-radius:10px;font-size:20px;font-weight:500;color:#424242;background:#fafafa;text-align:center;text-align-last:center}
  .time-row select:focus{outline:none;border-color:#4caf50}
  .time-sep{font-size:24px;font-weight:700;color:#757575}
  .results{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rbox{border-radius:12px;padding:14px;text-align:center}
  .rbox-green{background:#e8f5e9;border:1px solid rgba(76,175,80,.15)}
  .rbox-gold{background:linear-gradient(135deg,#f5e6c0,#fdf0d5);border:1px solid rgba(212,168,67,.3)}
  .rbox .lab{font-size:11px;color:#757575;margin-bottom:4px}
  .rbox .val{font-size:28px;font-weight:700;letter-spacing:1px;line-height:38px}
  .rbox-green .val{color:#1a5632}
  .rbox-gold .val{color:#8b6914}
  .settings-title{font-size:13px;color:#757575;margin-bottom:14px}
  .settings-row{display:flex;gap:10px}
  .setting-item{flex:1;position:relative}
  .setting-item label{font-size:11px;color:#bdbdbd;display:block;margin-bottom:6px}
  .setting-item input{width:100%;padding:10px 40px 10px 14px;border:1.5px solid #eee;border-radius:10px;font-size:18px;font-weight:500;color:#424242;background:#fafafa;text-align:center;-webkit-appearance:none;-moz-appearance:textfield}
  .setting-item input:focus{outline:none;border-color:#4caf50}
  .setting-unit{position:absolute;right:14px;bottom:12px;font-size:13px;color:#bdbdbd;pointer-events:none}
  .note{background:rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;margin-top:8px}
  .note p{color:rgba(255,255,255,.5);font-size:11px;line-height:1.8}
  .note strong{color:#d4a843}
  .footer{text-align:center;padding:20px;color:rgba(255,255,255,.3);font-size:11px}
</style>
</head>

  <div class="note"><p><strong>计算规则：</strong><br>到达时间 = 开球时间 - 提前到达，按5分钟取整<br>出发时间 = 到达时间 - 车程时间，按5分钟取整<br><strong>取整规则：</strong>尾数 0/1/2→0　3/4→5　5/6/7→5　8/9→下一个0</p></div>

<div class="footer">添加到主屏幕，像App一样使用</div>

<script>
(function(){
  function p(n){return n<10?'0'+n:''+n;}
  function r5(n){return Math.round(n/5)*5;}
  function hm(n){if(n<0)n+=1440;return p(Math.floor(n/60))+':'+p(n%60);}
  function go(){
    var tr=parseInt(document.getElementById('travelMin').value)||50;
    var ea=parseInt(document.getElementById('earlyMin').value)||25;
    var ids=[['h1','m1','a1','d1'],['h2','m2','a2','d2']];
    for(var i=0;i<ids.length;i++){
      var t=parseInt(document.getElementById(ids[i][0]).value)*60+parseInt(document.getElementById(ids[i][1]).value);
      var a=r5(t-ea);
      var d=r5(a-tr);
      document.getElementById(ids[i][2]).textContent=hm(a);
      document.getElementById(ids[i][3]).textContent=hm(d);
    }
  }
  var all=document.querySelectorAll('select,input');
  for(var i=0;i<all.length;i++){
    all[i].addEventListener('change',go);
    all[i].addEventListener('input',go);
    all[i].addEventListener('blur',go);
  }
  go();
})();
</script>
